name: CI — OmniVoice Mobile

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Syntax check
  # ──────────────────────────────────────────────
  syntax-check:
    name: Syntax & Import Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          pip install --quiet pyflakes mypy
          pip install --quiet torch torchaudio --index-url https://download.pytorch.org/whl/cpu 2>/dev/null || true

      - name: Check syntax
        run: |
          echo "=== Syntax Check ==="
          python -m py_compile src/omnivoice_mobile/__init__.py
          python -m py_compile src/omnivoice_mobile/cli.py
          python -m py_compile src/omnivoice_mobile/engine.py
          python -m py_compile scripts/quantize_model.py
          echo "All files: OK"

      - name: Check imports
        run: |
          echo "=== Import Check ==="
          pip install -e . --no-deps
          python -c "from omnivoice_mobile import OmniVoiceMobile, get_device_info; print('OK')"

  # ──────────────────────────────────────────────
  # Job 2: Shell script check
  # ──────────────────────────────────────────────
  shellcheck:
    name: Shell Scripts Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint install_termux.sh
        run: shellcheck scripts/install_termux.sh || true

      - name: Lint run.sh
        run: shellcheck run.sh || true

  # ──────────────────────────────────────────────
  # Job 3: Language map validation
  # ──────────────────────────────────────────────
  lang-map:
    name: Language Map Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate lang map
        run: |
          python3 -c "
          from omnivoice_mobile.engine import LANG_IDS, RU_NAMES, normalize_lang
          assert len(set(LANG_IDS.values())) == len(LANG_IDS.values())
          assert LANG_IDS['en'] == 0
          assert LANG_IDS['ru'] == 4
          assert normalize_lang('русский') == 'ru'
          print('Lang map: OK')
          "

  # ──────────────────────────────────────────────
  # Job 4: Structure validation
  # ──────────────────────────────────────────────
  structure:
    name: Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          FILES=(
            "README.md"
            "LICENSE"
            "CONTRIBUTING.md"
            "CODE_OF_CONDUCT.md"
            "SECURITY.md"
            "pyproject.toml"
            "scripts/bootstrap.sh"
            "scripts/install_termux.sh"
            "scripts/quantize_model.py"
            "src/omnivoice_mobile/__init__.py"
            "src/omnivoice_mobile/cli.py"
            "src/omnivoice_mobile/engine.py"
            ".github/workflows/ci.yml"
          )

          MISSING=0
          for f in "\${FILES[@]}"; do
            if [ -f "\$f" ]; then
              echo "  [OK] \$f"
            else
              echo "  [MISSING] \$f"
              MISSING=1
            fi
          done

          if [ \$MISSING -eq 1 ]; then
            echo "ERROR: Some files are missing!"
            exit 1
          fi

          echo "All files present!"

      - name: Check file permissions
        run: |
          test -x run.sh || chmod +x run.sh
          test -x scripts/install_termux.sh || chmod +x scripts/install_termux.sh
          echo "Permissions OK"
